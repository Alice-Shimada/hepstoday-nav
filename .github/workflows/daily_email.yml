name: HEPSToday Daily Digest

on:
  # Run every day at 06:00 UTC (07:00 in Europe/Berlin)
  schedule:
    - cron: '0 6 * * 1-5'
  # Allow manual trigger from the Actions tab
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests matplotlib

      - name: Run notification script
        env:
          OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL:  ${{ secrets.OPENAI_BASE_URL }}
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:  ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL:  ${{ secrets.SENDER_EMAIL }}
          # If your subscribers file is stored in the repository, point to it here
          SUBSCRIBERS_FILE: subscribers.json
          # If one needs to debug, uncomment this:
          # TARGET_DATE: "2026-03-06"
          TIMEZONE: Europe/Berlin
        run: |
          python notify_with_cards.py
